<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grad2)"/>
  <!-- Product showcase -->
  <g transform="translate(200, 100)">
    <!-- Camera -->
    <rect x="50" y="20" width="100" height="100" rx="10" fill="#3b82f6" opacity="0.9"/>
    <circle cx="100" cy="70" r="25" fill="#0f172a"/>
    <!-- Lock -->
    <rect x="200" y="50" width="80" height="120" rx="5" fill="#60a5fa" opacity="0.8"/>
    <circle cx="240" cy="80" r="15" fill="#0f172a"/>
    <!-- Sensor -->
    <rect x="330" y="40" width="60" height="80" rx="5" fill="#3b82f6" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="400" y="520" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="sans-serif">Complete Security Solutions</text>
</svg>
