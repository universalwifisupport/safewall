<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#grad3)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Support team illustration -->
  <g transform="translate(700, 100)">
    <!-- Person 1 -->
    <circle cx="50" cy="40" r="30" fill="#3b82f6" opacity="0.8"/>
    <rect x="30" y="75" width="40" height="60" fill="#60a5fa" opacity="0.8"/>
    
    <!-- Person 2 -->
    <circle cx="150" cy="50" r="30" fill="#60a5fa" opacity="0.7"/>
    <rect x="130" y="85" width="40" height="60" fill="#3b82f6" opacity="0.7"/>
    
    <!-- Headset icon -->
    <circle cx="100" cy="200" r="40" fill="#3b82f6" opacity="0.9"/>
    <path d="M 85 200 Q 85 185 100 185 Q 115 185 115 200" stroke="#0f172a" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Text overlay -->
  <text x="150" y="300" font-size="36" font-weight="bold" fill="#ffffff" font-family="sans-serif">Expert Support</text>
  <text x="150" y="350" font-size="20" fill="#cbd5e1" font-family="sans-serif">Available 24/7 for your security needs</text>
</svg>
